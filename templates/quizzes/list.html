{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz — SmartLearn</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .page-header { padding: 40px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .breadcrumb a { color: var(--text2); transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb-sep { opacity: 0.4; }
    .page-header-row { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .page-title { font-family: var(--font-display); font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .page-sub   { color: var(--text2); font-size: 14px; }

    /* Quiz grid */
    .quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

    /* Quiz card */
    .quiz-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
      display: flex; flex-direction: column; gap: 16px;
      position: relative; overflow: hidden;
    }
    .quiz-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.3s ease;
    }
    .quiz-card:hover { border-color: var(--border2); transform: translateY(-3px); box-shadow: 0 16px 40px rgba(0,0,0,0.35); }
    .quiz-card:hover::before { transform: scaleX(1); }

    .quiz-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .quiz-icon {
      width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
      background: linear-gradient(135deg, rgba(74,222,128,0.15), rgba(34,211,238,0.15));
      border: 1px solid rgba(74,222,128,0.2);
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .quiz-badges { display: flex; gap: 6px; flex-wrap: wrap; }

    .quiz-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
    .quiz-desc  { font-size: 13px; color: var(--text2); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .quiz-stats { display: flex; gap: 16px; flex-wrap: wrap; }
    .quiz-stat  { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }

    /* Score display */
    .quiz-score-wrap {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .quiz-score-label { font-size: 12px; color: var(--text2); }
    .quiz-score-value { font-family: var(--font-display); font-size: 20px; font-weight: 800; }
    .quiz-score-value.passed { color: var(--accent); }
    .quiz-score-value.failed { color: var(--danger); }

    .quiz-card-footer { margin-top: auto; }

    /* Empty */
    .empty-state { text-align: center; padding: 72px 24px; grid-column: 1/-1; }
    .empty-icon  { font-size: 52px; margin-bottom: 16px; opacity: 0.35; }
    .empty-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text2); }
    .empty-desc  { font-size: 14px; color: var(--muted); }

    .nav-logo-img { height: 60px; width: auto; object-fit: contain; }
    .nav-logo { display: flex; align-items: center; }
    .nav-logo-text { margin-left: -20px; }
  </style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb-green"></div>
  <div class="orb orb-cyan"></div>
</div>

<nav class="navbar z1">
  <a href="/" class="nav-logo">
    <img src="{% static 'images/smart_learn_logo.png' %}" alt="SmartLearn" class="nav-logo-img">
    <span class="nav-logo-text">SmartLearn</span>
  </a>
  <div class="nav-links" id="navbar-links"></div>
</nav>

<div class="page z1">
  <div class="page-inner-wide">

    <div class="breadcrumb animate-up">
      <a href="/courses/">Khóa học</a>
      <span class="breadcrumb-sep">›</span>
      <a href="#" id="bc-course">Đang tải...</a>
      <span class="breadcrumb-sep">›</span>
      <span>Quiz</span>
    </div>

    <div class="page-header animate-up">
      <div class="page-header-row">
        <div>
          <h1 class="page-title">Kiểm tra</h1>
          <p class="page-sub" id="page-sub">Đang tải...</p>
        </div>
        <div id="teacher-actions" style="display:none">
          <a href="#" id="btn-create-quiz" class="btn btn-primary" style="padding:11px 20px;font-size:13px">
            Tạo quiz mới
          </a>
        </div>
      </div>
    </div>

    <div class="quiz-grid" id="quiz-grid">
      <!-- Skeleton -->
      <div class="quiz-card animate-up" style="opacity:0.4">
        <div style="height:20px;background:var(--panel2);border-radius:6px;width:60%"></div>
        <div style="height:14px;background:var(--panel2);border-radius:6px;width:80%"></div>
        <div style="height:40px;background:var(--panel2);border-radius:8px"></div>
      </div>
    </div>

  </div>
</div>

<script src="/static/js/auth.js"></script>
<script>
  const QUIZ_API = 'http://localhost:8000/api/courses';
  const parts    = window.location.pathname.split('/').filter(Boolean);
  const courseId = parts[1];

  buildNavbar('courses');
  const user = Auth.getUser();

  // Set link tạo quiz
  document.getElementById('btn-create-quiz').href = `/courses/${courseId}/quizzes/create/`;

  async function init() {
    // Load course name
    try {
      const res  = await fetch(`http://localhost:8000/courses/api/${courseId}/`);
      const data = await res.json();
      document.getElementById('bc-course').textContent = data.title;
      document.getElementById('bc-course').href        = `/courses/${courseId}/`;
      document.getElementById('page-sub').textContent  = `Các bài kiểm tra của khóa "${data.title}"`;

      // Hiện nút tạo quiz nếu là owner
      const isOwner = data.teacher?.id === user?.id || user?.role === 'admin';
      if (isOwner) document.getElementById('teacher-actions').style.display = 'block';
    } catch {}

    loadQuizzes();
  }

  async function loadQuizzes() {
    const grid = document.getElementById('quiz-grid');
    try {
      const fetchFn = Auth.isLoggedIn() ? Auth.fetchWithAuth : fetch;
      const res     = await (Auth.isLoggedIn()
        ? Auth.fetchWithAuth(`${QUIZ_API}/${courseId}/quizzes/`)
        : fetch(`${QUIZ_API}/${courseId}/quizzes/`));

      if (!res) return;
      const quizzes = await res.json();

      if (!quizzes.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">
                <i class="fa-solid fa-file-lines"></i>
            </div>
            <div class="empty-title">Chưa có bài kiểm tra</div>
            <div class="empty-desc">Giáo viên chưa tạo quiz nào cho khóa học này.</div>
          </div>`;
        return;
      }

      grid.innerHTML = quizzes.map(renderQuizCard).join('');
    } catch {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Lỗi tải dữ liệu</div></div>`;
    }
  }

  function renderQuizCard(q) {
    const isOwner = (user?.role === 'teacher' || user?.role === 'admin');

    const timeLabel = q.time_limit
      ? `⏱ ${Math.floor(q.time_limit / 60)} phút`
      : '∞ Không giới hạn';

    const statusBadge = !q.is_published
      ? `<span class="badge badge-muted">Nháp</span>`
      : q.has_attempted
        ? `<span class="badge badge-green">✓ Đã làm</span>`
        : `<span class="badge badge-cyan">Chưa làm</span>`;

    const scoreSection = q.has_attempted ? `
      <div class="quiz-score-wrap">
        <div>
          <div class="quiz-score-label">Điểm của bạn</div>
          <div class="quiz-score-value ${q.my_score >= q.pass_score ? 'passed' : 'failed'}">
            ${q.my_score}%
          </div>
        </div>
        <div style="text-align:right">
          <div class="quiz-score-label">Điểm đạt</div>
          <div style="font-size:13px;color:var(--text2);font-weight:600">${q.pass_score}%</div>
        </div>
      </div>` : '';

    // ── Nút action theo role ──
    let actionBtn;
    if (isOwner) {
      // Teacher: luôn thấy cả 2 nút
      actionBtn = `
        <div style="display:flex;gap:8px">
          <a href="/courses/${courseId}/quizzes/${q.id}/"
            class="btn btn-outline btn-full" style="font-size:12px">
            Kết quả
          </a>
          <a href="/courses/${courseId}/quizzes/${q.id}/edit/"
            class="btn btn-primary btn-full" style="font-size:12px">
            Sửa
          </a>
        </div>
      `;
    } else if (q.has_attempted) {
      // Student đã làm → xem kết quả
      actionBtn = `
        <a href="/courses/${courseId}/quizzes/${q.id}/"
          class="btn btn-outline btn-full" style="font-size:13px">
          Xem kết quả
        </a>
      `;
    } else {
      // Student chưa làm → bắt đầu
      actionBtn = `
        <a href="/courses/${courseId}/quizzes/${q.id}/take/"
          class="btn btn-primary btn-full" style="font-size:13px">
          ▶ Bắt đầu làm bài
        </a>
      `;
    }

    return `
      <div class="quiz-card animate-up">
        <div class="quiz-card-header">
          <div class="quiz-icon">
            <i class="fa-solid fa-clipboard-question"></i>
          </div>
          <div class="quiz-badges">${statusBadge}</div>
        </div>
        <div>
          <div class="quiz-title">${q.title}</div>
          ${q.description ? `<div class="quiz-desc">${q.description}</div>` : ''}
        </div>
        <div class="quiz-stats">
          <span class="quiz-stat">
            <i class="fa-solid fa-circle-question"></i> ${q.question_count} câu hỏi
          </span>
          <span class="quiz-stat">${timeLabel}</span>
          <span class="quiz-stat">Đạt ${q.pass_score}%</span>
        </div>
        ${scoreSection}
        <div class="quiz-card-footer">${actionBtn}</div>
      </div>`;
  }

  init();
</script>
</body>
</html>
