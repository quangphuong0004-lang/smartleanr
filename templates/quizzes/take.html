{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Làm bài — SmartLearn</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/base.css" />
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { overflow-x: hidden; }

    /* ── Quiz layout ── */
    .quiz-layout {
      display: grid; grid-template-columns: 1fr 280px; gap: 0;
      min-height: calc(100vh - 68px); margin-top: 68px;
    }
    @media (max-width: 800px) { .quiz-layout { grid-template-columns: 1fr; } }

    /* ── Main content ── */
    .quiz-main { padding: 40px 48px; max-width: 760px; }
    @media (max-width: 800px) { .quiz-main { padding: 24px; } }

    /* Progress bar tổng */
    .quiz-progress-bar-wrap {
      background: rgba(255,255,255,0.07); border-radius: 4px; height: 6px;
      margin-bottom: 36px; overflow: hidden;
    }
    .quiz-progress-bar {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.5s ease;
    }

    /* Question card */
    .question-wrap { display: none; animation: fadeUp 0.3s ease; }
    .question-wrap.active { display: block; }

    .question-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .q-num {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 14px; font-weight: 800; color: #080c14;
    }
    .q-label { font-size: 13px; color: var(--muted); }
    .q-points { margin-left: auto; font-size: 12px; color: var(--accent); font-weight: 600; background: rgba(74,222,128,0.1); padding: 3px 10px; border-radius: 20px; }

    .question-text {
      font-family: var(--font-display); font-size: 20px; font-weight: 700;
      line-height: 1.5; margin-bottom: 28px; color: var(--text);
    }

    /* Choices */
    .choices-grid { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px; background: rgba(255,255,255,0.03);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: all 0.2s; text-align: left; width: 100%;
      font-family: var(--font-body); color: var(--text);
    }
    .choice-btn:hover:not(.selected) { border-color: var(--border2); background: rgba(255,255,255,0.05); }
    .choice-btn.selected { border-color: var(--accent); background: rgba(74,222,128,0.08); }

    .choice-letter {
      width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
      background: rgba(255,255,255,0.07); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--text2);
      transition: all 0.2s;
    }
    .choice-btn.selected .choice-letter { background: var(--accent); color: #080c14; border-color: var(--accent); }
    .choice-text { font-size: 15px; line-height: 1.5; }

    /* Navigation */
    .question-nav {
      display: flex; gap: 12px; justify-content: space-between;
      padding-top: 32px; border-top: 1px solid var(--border); margin-top: 32px;
      flex-wrap: wrap;
    }

    /* ── Sidebar ── */
    .quiz-sidebar {
      background: var(--panel); border-left: 1px solid var(--border);
      padding: 32px 24px; position: sticky; top: 68px;
      height: calc(100vh - 68px); overflow-y: auto;
    }
    @media (max-width: 800px) {
      .quiz-sidebar { position: static; height: auto; border-left: none; border-top: 1px solid var(--border); }
    }

    /* Timer */
    .timer-wrap {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px; margin-bottom: 24px; text-align: center;
    }
    .timer-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .timer-display {
      font-family: var(--font-display); font-size: 36px; font-weight: 800;
      color: var(--text); letter-spacing: 2px; transition: color 0.3s;
    }
    .timer-display.warning { color: var(--accent3); }
    .timer-display.danger  { color: var(--danger); animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* Question map */
    .q-map-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .q-map { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 24px; }
    .q-map-btn {
      aspect-ratio: 1; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.04); color: var(--text2);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
    }
    .q-map-btn:hover   { border-color: var(--border2); }
    .q-map-btn.current { border-color: var(--accent2); color: var(--accent2); background: rgba(34,211,238,0.08); }
    .q-map-btn.answered { border-color: rgba(74,222,128,0.3); color: var(--accent); background: rgba(74,222,128,0.08); }
    .q-map-btn.answered.current { border-color: var(--accent); background: rgba(74,222,128,0.15); }

    .sidebar-stats { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .sidebar-stat  { display: flex; justify-content: space-between; font-size: 13px; color: var(--text2); }
    .sidebar-stat span:last-child { font-weight: 600; color: var(--text); }

    /* Submit confirm */
    .confirm-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(8,12,20,0.9); backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .confirm-overlay.show { opacity: 1; pointer-events: all; }
    .confirm-modal {
      background: var(--panel); border: 1px solid var(--border2);
      border-radius: 28px; padding: 40px; text-align: center;
      max-width: 380px; width: 100%;
      transform: scale(0.92); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .confirm-overlay.show .confirm-modal { transform: scale(1); }
    .confirm-icon  { font-size: 48px; margin-bottom: 16px; }
    .confirm-title { font-family: var(--font-display); font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    .confirm-desc  { color: var(--text2); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .confirm-stats { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 24px; }
    .confirm-stat  { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
    .confirm-stat span:last-child { font-weight: 600; }
    .confirm-btns  { display: flex; gap: 10px; }

    .nav-logo-img { height: 60px; width: auto; object-fit: contain; }
    .nav-logo { display: flex; align-items: center; }
    .nav-logo-text { margin-left: -20px; }

    /* Loading state */
    .quiz-loading { padding: 80px; text-align: center; color: var(--muted); }
  </style>
</head>
<body>
<div class="bg-orbs" style="opacity:0.4">
  <div class="orb orb-green"></div>
  <div class="orb orb-cyan"></div>
</div>

<!-- Confirm submit -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-modal">
    <div class="confirm-title">Nộp bài?</div>
    <p class="confirm-desc">Bạn có chắc muốn nộp bài không? Sau khi nộp bạn không thể thay đổi câu trả lời.</p>
    <div class="confirm-stats" id="confirm-stats"></div>
    <div class="confirm-btns">
      <button class="btn btn-ghost" style="flex:1" onclick="closeConfirm()">Làm tiếp</button>
      <button class="btn btn-primary" style="flex:2" id="btn-confirm-submit" onclick="doSubmit()">
        <span class="btn-text">Xác nhận nộp</span>
        <div class="spinner"></div>
      </button>
    </div>
  </div>
</div>

<nav class="navbar z1">
  <a href="/" class="nav-logo">
    <img src="{% static 'images/smart_learn_logo.png' %}" alt="SmartLearn" class="nav-logo-img">
    <span class="nav-logo-text">SmartLearn</span>
  </a>
  <div class="nav-links" id="navbar-links"></div>
</nav>

<div class="quiz-layout z1" id="quiz-layout">
  <div class="quiz-main" id="quiz-main">
    <div class="quiz-loading">Đang tải bài kiểm tra...</div>
  </div>
  <aside class="quiz-sidebar" id="quiz-sidebar" style="display:none">
    <!-- filled by JS -->
  </aside>
</div>

<script src="/static/js/auth.js"></script>
<script>
  const QUIZ_API  = 'http://localhost:8000/api/courses';
  const parts     = window.location.pathname.split('/').filter(Boolean);
  const courseId  = parts[1];
  const quizId    = parts[3];

  let quizData    = null;
  let attemptId   = null;
  let answers     = {};   // { questionId: choiceId }
  let currentIdx  = 0;
  let timerInterval = null;
  let secondsLeft   = null;

  buildNavbar('courses');
  Auth.requireAuth();

  // ── Start quiz ────────────────────────────────────────────
  async function startQuiz() {
    try {
      const res  = await Auth.fetchWithAuth(`${QUIZ_API}/${courseId}/quizzes/${quizId}/start/`, { method: 'POST' });
      if (!res) return;

      if (res.status === 400) {
        const data = await res.json();
        // Đã làm rồi → redirect về kết quả
        if (data.error?.includes('đã hoàn thành')) {
          window.location.href = `/courses/${courseId}/quizzes/${quizId}/`;
          return;
        }
        document.getElementById('quiz-main').innerHTML = `
          <div style="padding:60px;text-align:center">
            <div style="font-size:40px;margin-bottom:16px">⚠️</div>
            <div style="font-size:16px;font-weight:600;margin-bottom:8px">${data.error}</div>
            <a href="/courses/${courseId}/quizzes/" class="btn btn-primary" style="margin-top:16px;display:inline-flex">Quay lại</a>
          </div>`;
        return;
      }

      if (!res.ok) throw new Error('Không thể bắt đầu quiz.');

      const data  = await res.json();
      quizData    = data.quiz;
      attemptId   = data.attempt_id;

      renderQuiz();

      // Khởi động timer
      if (quizData.time_limit) {
        secondsLeft = quizData.time_limit;
        startTimer();
      }
    } catch (err) {
      document.getElementById('quiz-main').innerHTML = `
        <div style="padding:60px;text-align:center;color:var(--muted)">Lỗi: ${err.message}</div>`;
    }
  }

  // ── Render quiz ───────────────────────────────────────────
  function renderQuiz() {
    const questions = quizData.questions;
    const letters   = ['A','B','C','D','E','F'];
    const main      = document.getElementById('quiz-main');
    const sidebar   = document.getElementById('quiz-sidebar');
    sidebar.style.display = 'block';

    // Main: progress bar + tất cả câu hỏi (hidden)
    main.innerHTML = `
      <div class="quiz-progress-bar-wrap">
        <div class="quiz-progress-bar" id="q-progress" style="width:0%"></div>
      </div>
      ${questions.map((q, i) => `
        <div class="question-wrap ${i === 0 ? 'active' : ''}" id="qwrap-${i}">
          <div class="question-header">
            <div class="q-num">${i+1}</div>
            <div class="q-label">Câu ${i+1} / ${questions.length}</div>
            <div class="q-points">${q.points} điểm</div>
          </div>
          <div class="question-text">${q.text}</div>
          <div class="choices-grid">
            ${q.choices.map((c, ci) => `
              <button class="choice-btn" id="choice-${i}-${ci}"
                      onclick="selectChoice(${i}, '${q.id}', '${c.id}', ${ci})">
                <div class="choice-letter">${letters[ci]}</div>
                <div class="choice-text">${c.text}</div>
              </button>`).join('')}
          </div>
          <div class="question-nav">
            <div>
              ${i > 0
                ? `<button class="btn btn-outline" onclick="goTo(${i-1})">← Câu trước</button>`
                : '<div></div>'}
            </div>
            <div style="display:flex;gap:10px">
              ${i < questions.length - 1
                ? `<button class="btn btn-primary" onclick="goTo(${i+1})">Câu tiếp →</button>`
                : `<button class="btn btn-primary" onclick="openConfirm()" style="background:linear-gradient(135deg,var(--accent3),#f59e0b);color:#080c14">📤 Nộp bài</button>`}
            </div>
          </div>
        </div>`).join('')}
    `;

    renderSidebar();
  }

  function renderSidebar() {
    const questions = quizData.questions;
    const answered  = Object.keys(answers).length;

    const timerHtml = quizData.time_limit ? `
      <div class="timer-wrap">
        <div class="timer-label">Thời gian còn lại</div>
        <div class="timer-display" id="timer-display">--:--</div>
      </div>` : '';

    const mapBtns = questions.map((q, i) => {
      const isAnswered = !!answers[q.id];
      const isCurrent  = i === currentIdx;
      return `<button class="q-map-btn ${isCurrent?'current':''} ${isAnswered?'answered':''}"
                      onclick="goTo(${i})">${i+1}</button>`;
    }).join('');

    document.getElementById('quiz-sidebar').innerHTML = `
      ${timerHtml}
      <div class="q-map-title">Danh sách câu hỏi</div>
      <div class="q-map">${mapBtns}</div>
      <div class="sidebar-stats">
        <div class="sidebar-stat"><span>Đã trả lời</span><span style="color:var(--accent)">${answered} / ${questions.length}</span></div>
        <div class="sidebar-stat"><span>Chưa trả lời</span><span style="color:var(--muted)">${questions.length - answered}</span></div>
      </div>
      <button class="btn btn-primary btn-full" onclick="openConfirm()" style="background:linear-gradient(135deg,var(--accent3),#f59e0b);color:#080c14;font-size:13px">
        Nộp bài
      </button>
    `;

    // Re-attach timer display nếu có
    if (quizData.time_limit && secondsLeft !== null) {
      updateTimerDisplay();
    }
  }

  // ── Navigation ────────────────────────────────────────────
  function goTo(idx) {
    document.getElementById(`qwrap-${currentIdx}`)?.classList.remove('active');
    document.getElementById(`qwrap-${idx}`)?.classList.add('active');
    currentIdx = idx;

    // Update progress bar
    const pct = Math.round((idx + 1) / quizData.questions.length * 100);
    document.getElementById('q-progress').style.width = `${pct}%`;

    renderSidebar();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Select choice ─────────────────────────────────────────
  function selectChoice(qIdx, questionId, choiceId, choiceIdx) {
    answers[questionId] = choiceId;

    // Update UI của câu hỏi này
    const q = quizData.questions[qIdx];
    q.choices.forEach((_, ci) => {
      document.getElementById(`choice-${qIdx}-${ci}`)?.classList.remove('selected');
    });
    document.getElementById(`choice-${qIdx}-${choiceIdx}`)?.classList.add('selected');

    renderSidebar();
  }

  // ── Timer ─────────────────────────────────────────────────
  function startTimer() {
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      secondsLeft--;
      updateTimerDisplay();
      if (secondsLeft <= 0) {
        clearInterval(timerInterval);
        autoSubmit();
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    const el = document.getElementById('timer-display');
    if (!el) return;
    const m = Math.floor(secondsLeft / 60);
    const s = secondsLeft % 60;
    el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    el.className = 'timer-display';
    if (secondsLeft <= 60)  el.classList.add('danger');
    else if (secondsLeft <= 300) el.classList.add('warning');
  }

  async function autoSubmit() {
    showAlert = () => {}; // suppress alerts
    await doSubmit();
  }

  // ── Confirm modal ─────────────────────────────────────────
  function openConfirm() {
    const questions = quizData.questions;
    const answered  = Object.keys(answers).length;
    document.getElementById('confirm-stats').innerHTML = `
      <div class="confirm-stat"><span>Tổng câu hỏi</span><span>${questions.length}</span></div>
      <div class="confirm-stat"><span>Đã trả lời</span><span style="color:var(--accent)">${answered}</span></div>
      <div class="confirm-stat"><span>Chưa trả lời</span><span style="color:${answered<questions.length?'var(--danger)':'var(--muted)'}">${questions.length - answered}</span></div>
    `;
    document.getElementById('confirm-overlay').classList.add('show');
  }
  function closeConfirm() {
    document.getElementById('confirm-overlay').classList.remove('show');
  }

  // ── Submit ────────────────────────────────────────────────
  async function doSubmit() {
    clearInterval(timerInterval);
    setLoading('btn-confirm-submit', true);

    const answersArr = quizData.questions.map(q => ({
      question_id: q.id,
      choice_id:   answers[q.id] || null,
    }));

    try {
      const res  = await Auth.fetchWithAuth(
        `${QUIZ_API}/${courseId}/quizzes/${quizId}/attempts/${attemptId}/submit/`,
        { method: 'POST', body: JSON.stringify({ answers: answersArr }) }
      );
      if (!res) return;
      const data = await res.json();

      if (res.ok) {
        window.location.href = `/courses/${courseId}/quizzes/${quizId}/result/${attemptId}/`;
      } else {
        document.getElementById('confirm-overlay').classList.remove('show');
        alert(data.error || 'Lỗi nộp bài.');
      }
    } catch {
      alert('Lỗi kết nối.');
    } finally {
      setLoading('btn-confirm-submit', false);
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeConfirm(); });

  startQuiz();
</script>
</body>
</html>
